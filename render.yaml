services:
  - type: web
    name: event-registration-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8081
      - key: DATABASE_URL
        fromDatabase:
          name: event-registration-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: EXTERNAL_SERVICE_API_KEY
        sync: false

databases:
  - name: event-registration-db
    databaseName: event_registration
    user: event_user
    plan: free
