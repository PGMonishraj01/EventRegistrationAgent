<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Event Agent - Authentication</title>
    <!-- Include Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Include Theme JS immediately to apply theme -->
    <script src="js/theme.js"></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <!-- Theme Toggle Button top right of card -->
            <div style="position: absolute; top: 15px; right: 15px;">
                <button id="theme-toggle-btn" class="theme-toggle-btn" title="Toggle Light/Dark Mode">
                    <!-- Sun Icon (Visible in Dark Mode) -->
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                    </svg>
                    <!-- Moon Icon (Visible in Light Mode) -->
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                    </svg>
                </button>
            </div>

            <div class="auth-header">
                <h1>Event Registration Agent</h1>
                <p id="auth-subtitle">Welcome back! Please enter your details.</p>
            </div>

            <!-- Dynamic Alert Box for Success/Error Messages -->
            <div id="alert-box" class="alert-message"></div>

            <!-- 1. LOGIN FORM -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" required placeholder="••••••••">
                        <button type="button" class="toggle-password-btn" title="Toggle Password Visibility">
                            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61M2 2l20 20"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="auth-btn">Log In</button>
                <div class="auth-toggle">
                    Don't have an account? <a href="#" id="to-signup">Sign Up</a><br>
                    <a href="#" id="to-forgot" style="display: inline-block; margin-top: 10px; font-size: 0.85rem; font-weight: 500;">Forgot Password?</a>
                </div>
            </form>

            <!-- 2. SIGN UP FORM -->
            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" required placeholder="john@doe.com">
                </div>
                <div class="form-group">
                    <label for="signup-phone">Phone Number</label>
                    <div class="phone-wrapper">
                        <select id="signup-country-code" class="country-code-select" required>
                            <option value="+91" selected>India (+91)</option>
                            <option value="+1">United States (+1)</option>
                            <option value="+44">United Kingdom (+44)</option>
                            <option value="+61">Australia (+61)</option>
                            <option value="+1">Canada (+1)</option>
                            <option value="+49">Germany (+49)</option>
                            <option value="+33">France (+33)</option>
                            <option value="+65">Singapore (+65)</option>
                            <option value="+971">United Arab Emirates (+971)</option>
                            <option value="+81">Japan (+81)</option>
                            <option value="+86">China (+86)</option>
                            <option value="+55">Brazil (+55)</option>
                            <option value="+27">South Africa (+27)</option>
                        </select>
                        <input type="tel" id="signup-phone" required placeholder="98765 43210">
                    </div>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="signup-password" required placeholder="••••••••">
                        <button type="button" class="toggle-password-btn" title="Toggle Password Visibility">
                            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61M2 2l20 20"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="signup-industry">Industry</label>
                    <select id="signup-industry" required>
                        <option value="Technology" selected>Technology</option>
                        <option value="Education">Education</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Corporate">Corporate / Business</option>
                        <option value="Entertainment">Entertainment / Arts</option>
                        <option value="Sports">Sports & Fitness</option>
                        <option value="Social">Social / Community</option>
                    </select>
                </div>
                <button type="submit" class="auth-btn">Create Account</button>
                <div class="auth-toggle">
                    Already have an account? <a href="#" id="to-login-from-signup">Log In</a>
                </div>
            </form>

            <!-- 3. FORGOT PASSWORD FORM -->
            <form id="forgot-form" class="auth-form">
                <div class="form-group">
                    <label for="forgot-email">Email Address</label>
                    <input type="email" id="forgot-email" required placeholder="name@company.com">
                </div>
                <button type="submit" class="auth-btn">Recover Password</button>
                <div class="auth-toggle">
                    Remember your password? <a href="#" id="to-login-from-forgot">Back to Log In</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Include Auth Logic JS -->
    <script src="js/auth.js"></script>
</body>
</html>
